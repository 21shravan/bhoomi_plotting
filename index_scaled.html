function showgut(gutNumber){
  let folder = '';

  if(current === 'rajgad') folder = 'rajgad_gut';
  if(current === 'torna') folder = 'torna_gut';
  if(current === 'sinhgad') folder = 'sinhgad_gut';

  const imagePath = `${folder}/${gutNumber}.png`;

  const container = document.getElementById('mapContainer');
  const title = document.getElementById('title');

  title.innerText = `gut No ${gutNumber}`;

  container.innerHTML = `
    <svg viewBox="0 0 739 1600">
      <image href="${imagePath}" width="739" height="1600" />
    </svg>
  `;
}

// GLOBAL CLICK HANDLER

document.addEventListener('click', function(e){
  if(e.target.tagName === 'polygon'){
    const gutNumber = e.target.dataset.gut;
    if(gutNumber){
      showgut(gutNumber);
    }
  }
});

function goBack(){
  if(current === 'main') return;
  loadMain();
  current = 'main';
}
